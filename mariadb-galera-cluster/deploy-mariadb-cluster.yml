---
- hosts: all
  become: true
  become_method: sudo
  vars:
    mariadb_cluster_name: prod_mariadb_cluster
    mariadb_root_password: "ChangeMe!123"
    mariadb_version: "10.11"
    mariadb_mirror: "https://mirror.mariadb.org/repo"

  tasks:

# ============================================================
# 1. SETUP MARIADB REPOSITORY
# ============================================================

  - name: Install required system packages
    apt:
      name: "{{ item }}"
      state: present
      update_cache: yes
    with_items:
      - software-properties-common
      - gnupg
      - curl
      - wget
    when: "'mariadb_cluster' in group_names"

  - name: Import MariaDB GPG key
    apt_key:
      keyserver: keyserver.ubuntu.com
      id: "0xF1656F24C74CD1D8"
    when: "'mariadb_cluster' in group_names"

  - name: Add MariaDB repository
    apt_repository:
      repo: "deb [arch=amd64] {{ mariadb_mirror }}/{{ mariadb_version }}/ubuntu {{ ansible_distribution_release }} main"
      state: present
      update_cache: yes
      mode: 0644
    when: "'mariadb_cluster' in group_names"

  - name: Pin MariaDB repository for higher priority
    blockinfile:
      create: yes
      dest: /etc/apt/preferences.d/mariadb-cluster.pref
      content: |
        Package: *
        Pin: origin mirror.mariadb.org
        Pin-Priority: 1001
    when: "'mariadb_cluster' in group_names"

# ============================================================
# 2. INSTALL MARIADB & GALERA PACKAGES
# ============================================================

  - name: Disable MariaDB AppArmor profile
    file:
      src: /etc/apparmor.d/usr.sbin.mariadbd
      dest: /etc/apparmor.d/disable/usr.sbin.mariadbd
      state: link
      force: yes
    when: "'mariadb_cluster' in group_names"
    ignore_errors: yes

  - name: Restart AppArmor
    systemd:
      name: apparmor
      state: restarted
    when: "'mariadb_cluster' in group_names"

  - name: Install MariaDB server, Galera, and dependencies
    apt:
      name: "{{ item }}"
      state: present
      update_cache: yes
      force: yes
    with_items:
      - mariadb-server
      - mariadb-client
      - mariadb-backup
      - galera-4
      - galera-arbitrator-4
      - rsync
      - python3-mysqldb
      - python-mysqldb
    when: "'mariadb_cluster' in group_names"

  - name: Stop MariaDB service before configuration
    systemd:
      name: mariadb
      state: stopped
    when: "'mariadb_cluster' in group_names"
    ignore_errors: yes

  - name: Ensure MariaDB data directory exists with correct permissions
    file:
      path: /var/lib/mysql
      state: directory
      owner: mysql
      group: mysql
      mode: 0755
    when: "'mariadb_cluster' in group_names"

  - name: Disable MariaDB systemd unit to prevent cluster from starting in wrong order
    systemd:
      name: mariadb
      enabled: no
    when: "'mariadb_cluster' in group_names"

  - name: Mask mariadb systemd service to prevent accidental start
    systemd:
      name: mariadb
      masked: yes
    when: "'mariadb_cluster' in group_names"

# ============================================================
# 3. CREATE MARIADB GALERA CLUSTER CONFIGURATION
# ============================================================

  - name: Ensure MySQL conf.d directory exists
    file:
      path: /etc/mysql/conf.d
      state: directory
      owner: root
      group: root
      mode: 0755
    when: "'mariadb_cluster' in group_names"

  - name: Deploy MariaDB Galera Cluster configuration file
    template:
      src: mariadb-cluster-config.j2
      dest: /etc/mysql/conf.d/mariadb_galera_cluster.cnf
      owner: mysql
      group: mysql
      mode: 0640
    when: "'mariadb_cluster' in group_names"

  - name: Remove conflicting MySQL default config if exists
    file:
      path: /etc/mysql/conf.d/mysql.cnf
      state: absent
    when: "'mariadb_cluster' in group_names"

  - name: Remove old Galera config if exists (from previous MySQL)
    file:
      path: /etc/mysql/conf.d/mysql_galera_cluster.cnf
      state: absent
    when: "'mariadb_cluster' in group_names"

# ============================================================
# 4. CREATE SST USER FOR MARIABACKUP
# ============================================================

  - name: Bootstrap MariaDB temporarily to create SST user
    shell: |
      mysqld --user=mysql --skip-grant-tables --skip-networking &
      sleep 5
      mysql -u root -e "FLUSH PRIVILEGES;"
      mysql -u root -e "CREATE USER IF NOT EXISTS 'mariabackup'@'localhost' IDENTIFIED BY '{{ mariadb_root_password }}';"
      mysql -u root -e "GRANT RELOAD, PROCESS, LOCK TABLES, REPLICATION CLIENT ON *.* TO 'mariabackup'@'localhost';"
      mysql -u root -e "FLUSH PRIVILEGES;"
      mysqladmin -u root shutdown
    args:
      executable: /bin/bash
    when: "inventory_hostname == groups['mariadb_cluster'][0]"
    ignore_errors: yes

# ============================================================
# 5. CLUSTER STOP SEQUENCE
# ============================================================

  - name: Unmask MariaDB systemd service before stop
    systemd:
      name: mariadb
      masked: no
    when: "'mariadb_cluster' in group_names"
    tags:
      - stop_cluster
      - start_cluster

  - name: Stop slave MariaDB nodes
    systemd:
      name: mariadb
      state: stopped
    when: "('load_balancer' not in group_names) and (inventory_hostname != groups['mariadb_cluster'][0])"
    tags:
      - stop_cluster

  - name: Wait 20 seconds to safely shutdown all slave MariaDB nodes
    pause:
      seconds: 20
    tags:
      - stop_cluster

  - name: Stop primary MariaDB node
    systemd:
      name: mariadb
      state: stopped
    when: inventory_hostname == groups['mariadb_cluster'][0]
    tags:
      - stop_cluster

  - name: Wait 10 seconds for complete shutdown
    pause:
      seconds: 10
    tags:
      - stop_cluster

# ============================================================
# 6. CLUSTER START / BOOTSTRAP SEQUENCE
# ============================================================

  - name: Bootstrap primary MariaDB node with Galera
    shell: |
      galera_new_cluster
    args:
      executable: /bin/bash
    when: inventory_hostname == groups['mariadb_cluster'][0]
    any_errors_fatal: true
    register: bootstrap_result
    tags:
      - start_cluster

  - name: Display bootstrap result
    debug:
      msg: "Bootstrap result: {{ bootstrap_result.stdout_lines | default('OK') }}"
    when: inventory_hostname == groups['mariadb_cluster'][0]
    tags:
      - start_cluster

  - name: Wait 15 seconds after bootstrapping primary node
    pause:
      seconds: 15
    tags:
      - start_cluster

  - name: Enable MariaDB systemd unit on primary node
    systemd:
      name: mariadb
      enabled: yes
    when: inventory_hostname == groups['mariadb_cluster'][0]
    tags:
      - start_cluster

  - name: Start slave MariaDB nodes
    systemd:
      name: mariadb
      state: started
      enabled: yes
    when: "('load_balancer' not in group_names) and (inventory_hostname != groups['mariadb_cluster'][0])"
    any_errors_fatal: true
    register: slave_start_result
    retries: 3
    delay: 5
    until: slave_start_result is success
    tags:
      - start_cluster

  - name: Wait 10 seconds for cluster to fully sync
    pause:
      seconds: 10
    tags:
      - start_cluster

# ============================================================
# 7. SETUP HAPROXY LOAD BALANCER
# ============================================================

  - name: Install HAProxy packages
    apt:
      name: "{{ item }}"
      state: present
      update_cache: yes
    with_items:
      - haproxy
      - python3-mysqldb
    when: "'load_balancer' in group_names"

  - name: Enable HAProxy systemd service
    systemd:
      name: haproxy
      enabled: yes
    when: "'load_balancer' in group_names"

  - name: Deploy HAProxy configuration file
    template:
      src: haproxy-config.j2
      dest: /etc/haproxy/haproxy.cfg
      owner: root
      group: root
      mode: 0644
      validate: 'haproxy -c -f %s'
    when: "'load_balancer' in group_names"

# ============================================================
# 8. SET MARIADB ROOT USER PASSWORD & USERS
# ============================================================

  - name: Check if MariaDB is running on primary node
    shell: mysqladmin ping -u root --silent
    register: mysql_ping
    ignore_errors: yes
    changed_when: false
    when: inventory_hostname == groups['mariadb_cluster'][0]

  - name: Set MariaDB root password from load balancer and localhost
    mysql_user:
      name: root
      host: "{{ item }}"
      check_implicit_admin: yes
      login_user: root
      login_password: ""
      password: "{{ mariadb_root_password }}"
      priv: "*.*:ALL,GRANT"
      state: present
      update_password: always
    when: inventory_hostname == groups['mariadb_cluster'][0]
    with_items:
      - "{{ hostvars[groups['load_balancer'][0]]['ansible_default_ipv4']['address'] }}"
      - 127.0.0.1
      - "localhost"
      - "%"

  - name: Remove anonymous users
    mysql_user:
      name: ""
      host_all: yes
      state: absent
      login_user: root
      login_password: "{{ mariadb_root_password }}"
    when: inventory_hostname == groups['mariadb_cluster'][0]

  - name: Remove test database
    mysql_db:
      name: test
      state: absent
      login_user: root
      login_password: "{{ mariadb_root_password }}"
    when: inventory_hostname == groups['mariadb_cluster'][0]

  - name: Create HAProxy MySQL health check user
    mysql_user:
      name: haproxy
      host: "{{ hostvars[groups['load_balancer'][0]]['ansible_default_ipv4']['address'] }}"
      state: present
      password: ""
      check_implicit_admin: yes
      login_user: root
      login_password: "{{ mariadb_root_password }}"
    when: inventory_hostname == groups['mariadb_cluster'][0]

  - name: Ensure HAProxy health check user exists on all cluster nodes
    mysql_user:
      name: haproxy
      host: "{{ hostvars[groups['load_balancer'][0]]['ansible_default_ipv4']['address'] }}"
      state: present
      password: ""
      check_implicit_admin: yes
      login_user: root
      login_password: "{{ mariadb_root_password }}"
    when: "'mariadb_cluster' in group_names"

# ============================================================
# 9. RESTART HAPROXY WITH NEW CONFIG
# ============================================================

  - name: Restart HAProxy service
    systemd:
      name: haproxy
      state: restarted
      daemon_reload: yes
    when: "'load_balancer' in group_names"

# ============================================================
# 10. VERIFY CLUSTER STATUS
# ============================================================

  - name: Test cluster status via load balancer
    shell: >
      mysql
      -h {{ hostvars[groups['load_balancer'][0]]['ansible_default_ipv4']['address'] }}
      -u root -p{{ mariadb_root_password }}
      -e "SHOW STATUS LIKE 'wsrep_cluster_size'"
      | grep 'wsrep_cluster_size'
      | awk '{print $2}'
    when: inventory_hostname == groups['load_balancer'][0]
    run_once: true
    register: cluster_status

  - name: Test cluster consistency (check all nodes have same status)
    shell: >
      mysql
      -h {{ hostvars[groups['load_balancer'][0]]['ansible_default_ipv4']['address'] }}
      -u root -p{{ mariadb_root_password }}
      -e "SHOW STATUS LIKE 'wsrep_local_state_comment'"
      | grep 'wsrep_local_state_comment'
      | awk '{print $2}'
    when: inventory_hostname == groups['load_balancer'][0]
    run_once: true
    register: cluster_state

  - name: Display cluster connection information
    debug:
      msg:
        - "==========================================="
        - " MariaDB Galera Cluster Setup Complete!"
        - "==========================================="
        - " Cluster Name      : {{ mariadb_cluster_name }}"
        - " Active Nodes      : {{ cluster_status.stdout }}"
        - " Cluster State     : {{ cluster_state.stdout | default('Synced') }}"
        - ""
        - " Connection String :"
        - " mysql -h {{ hostvars[groups['load_balancer'][0]]['ansible_default_ipv4']['address'] }} -P 3306 -u root -p"
        - ""
        - " HAProxy Stats     :"
        - " http://{{ hostvars[groups['load_balancer'][0]]['ansible_default_ipv4']['address'] }}:8404/"
        - " Username: admin  Password: admin123"
        - "==========================================="
    when: inventory_hostname == groups['load_balancer'][0]
    run_once: true