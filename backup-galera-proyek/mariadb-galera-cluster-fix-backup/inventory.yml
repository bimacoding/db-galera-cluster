# inventory.yml — format YAML (kompatibel Ansible 14+)
# Dikonfigurasi manual / configure-inventory.sh
#
# Jika server memiliki LEBIH DARI SATU network interface (umum di
# VPS cloud: NIC publik + NIC privat/VPC), set interface_ip per host
# agar Galera & HAProxy bind ke IP yang benar.

all:
  children:
    mariadb_cluster:
      hosts:
        mariadb_node_1:
          ansible_host: 10.219.3.50
          ansible_port: 22
          ansible_user: vta
          interface_ip: 10.219.3.50
        mariadb_node_2:
          ansible_host: 10.219.3.51
          ansible_port: 22
          ansible_user: vta
          interface_ip: 10.219.3.51
        mariadb_node_3:
          ansible_host: 10.219.3.52
          ansible_port: 22
          ansible_user: vta
          interface_ip: 10.219.3.52
    load_balancer:
      hosts:
        haproxy_load_balancer:
          ansible_host: 10.219.3.53
          ansible_port: 22
          ansible_user: vta
          interface_ip: 10.219.3.53
