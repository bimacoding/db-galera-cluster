# deploy-mariadb-cluster.yml
# ==============================================================
# PERBAIKAN DARI VERSI ASLI:
#  1. apt_key (deprecated/dihapus) -> diganti get_url + signed-by keyring
#  2. Tambah wsrep_sst_auth (mariabackup user+pass) di config Galera
#     -> tanpa ini, SST/IST antar-node SELALU gagal autentikasi
#  3. Pembuatan SST user dipindah ke SETELAH cluster bootstrap normal,
#     bukan via instance mysqld sementara yang rapuh
#  4. Tambah wait_for port 3306 sebelum task yang butuh koneksi mysql
#     -> mengganti pause statis yang rapuh
#  5. interface_ip var dipakai sebagai ganti ansible_default_ipv4
#     agar bisa di-override jika server multi-NIC
#  6. ignore_errors dihapus dari task kritikal supaya kegagalan
#     terdeteksi (fail fast) bukan lanjut diam-diam
#  7. Tambah requirements.yml (community.mysql) sebagai prasyarat
#  8. mysql_user login memakai unix_socket utk root (lebih aman/andal
#     daripada password kosong yang gagal di run kedua)
#  9. Password root TIDAK lagi hardcoded plaintext default; harus
#     diisi lewat vars/vault atau configure-inventory.sh / group_vars
# ==============================================================
---
- hosts: all
  become: true
  become_method: sudo
  gather_facts: true
  vars:
    mariadb_cluster_name: prod_mariadb_cluster
    # WAJIB diisi. Jangan commit password asli ke git -- gunakan
    # ansible-vault atau export ANSIBLE_VAULT_PASSWORD_FILE.
    mariadb_root_password: "tz8WVARs2Nyq5A87vk54tAF3"
    mariadb_sst_password: "tz8WVARs2Nyq5A87vk54tAF3"
    mariadb_version: "10.11"
    mariadb_mirror: "https://mirror.mariadb.org/repo"
    # Override per-host di inventory jika server multi-NIC dan
    # ansible_default_ipv4 mendeteksi interface yang salah, contoh:
    #   mariadb_node_1 ansible_host=1.2.3.4 interface_ip=10.0.0.2
    interface_ip: "{{ ansible_default_ipv4.address }}"

  tasks:

# ============================================================
# 1. SETUP MARIADB REPOSITORY
# ============================================================

  - name: Install required system packages
    apt:
      name: "{{ item }}"
      state: present
      update_cache: yes
      cache_valid_time: 3600
    loop:
      - software-properties-common
      - gnupg
      - curl
      - wget
      - apt-transport-https
      - ca-certificates
    when: "'mariadb_cluster' in group_names"

  - name: Pastikan direktori keyring tersedia
    file:
      path: /usr/share/keyrings
      state: directory
      mode: "0755"
    when: "'mariadb_cluster' in group_names"

  - name: Unduh dan simpan MariaDB GPG key (apt_key sudah deprecated)
    get_url:
      url: "https://mariadb.org/mariadb_release_signing_key.pgp"
      dest: /usr/share/keyrings/mariadb-keyring.pgp
      mode: "0644"
      force: false
    when: "'mariadb_cluster' in group_names"
    register: mariadb_key_download
    retries: 3
    delay: 5
    until: mariadb_key_download is succeeded

  - name: Convert MariaDB key ke format dearmored (jika masih ASCII-armored)
    shell: >
      gpg --batch --yes --dearmor --output /usr/share/keyrings/mariadb-keyring.gpg
      /usr/share/keyrings/mariadb-keyring.pgp 2>/dev/null || true
    args:
      executable: /bin/bash
      creates: /usr/share/keyrings/mariadb-keyring.gpg
    when: "'mariadb_cluster' in group_names"

  - name: Tentukan path keyring final yang valid
    stat:
      path: /usr/share/keyrings/mariadb-keyring.gpg
    register: keyring_dearmored
    when: "'mariadb_cluster' in group_names"

  - name: Set fact keyring path
    set_fact:
      mariadb_keyring_path: >-
        {{ '/usr/share/keyrings/mariadb-keyring.gpg' if (keyring_dearmored.stat.exists | default(false))
           else '/usr/share/keyrings/mariadb-keyring.pgp' }}
    when: "'mariadb_cluster' in group_names"

  - name: Add MariaDB repository (signed-by keyring, bukan apt_key global)
    apt_repository:
      repo: "deb [arch=amd64 signed-by={{ mariadb_keyring_path }}] {{ mariadb_mirror }}/{{ mariadb_version }}/ubuntu {{ ansible_distribution_release }} main"
      state: present
      filename: mariadb
      update_cache: yes
      mode: "0644"
    when: "'mariadb_cluster' in group_names"

  - name: Pin MariaDB repository untuk priority lebih tinggi
    copy:
      dest: /etc/apt/preferences.d/mariadb-cluster.pref
      mode: "0644"
      content: |
        Package: *
        Pin: origin mirror.mariadb.org
        Pin-Priority: 1001
    when: "'mariadb_cluster' in group_names"

# ============================================================
# 2. INSTALL MARIADB & GALERA PACKAGES
# ============================================================

  - name: Disable MariaDB AppArmor profile
    file:
      src: /etc/apparmor.d/usr.sbin.mariadbd
      dest: /etc/apparmor.d/disable/usr.sbin.mariadbd
      state: link
      force: yes
    when: "'mariadb_cluster' in group_names"
    failed_when: false

  - name: Restart AppArmor (jika service ada)
    systemd:
      name: apparmor
      state: restarted
    when: "'mariadb_cluster' in group_names"
    failed_when: false

  - name: Install MariaDB server, Galera, dan dependencies
    apt:
      name: "{{ item }}"
      state: present
      update_cache: yes
    loop:
      - mariadb-server
      - mariadb-client
      - mariadb-backup
      - galera-4
      - rsync
      - python3-pymysql
    when: "'mariadb_cluster' in group_names"
    # Catatan: python3-mysqldb / python-mysqldb sudah tidak ada di
    # Ubuntu 22.04/24.04. Modul Ansible mysql_user/mysql_db modern
    # memakai PyMySQL, bukan MySQLdb -- python3-pymysql cukup.

  - name: Stop MariaDB service sebelum konfigurasi
    shell: |
      set -o pipefail
      if ! systemctl is-active --quiet mariadb 2>/dev/null; then
        systemctl reset-failed mariadb 2>/dev/null || true
        exit 0
      fi
      timeout 30 systemctl stop mariadb 2>/dev/null || true
      if systemctl is-active --quiet mariadb 2>/dev/null; then
        systemctl kill -s SIGKILL mariadb 2>/dev/null || true
        pkill -9 mariadbd 2>/dev/null || true
        pkill -9 -f wsrep_sst 2>/dev/null || true
        systemctl reset-failed mariadb 2>/dev/null || true
      fi
    args:
      executable: /bin/bash
    when: "'mariadb_cluster' in group_names"
    changed_when: true
    failed_when: false

  - name: Pastikan direktori data MariaDB ada dengan permission benar
    file:
      path: /var/lib/mysql
      state: directory
      owner: mysql
      group: mysql
      mode: "0750"
    when: "'mariadb_cluster' in group_names"

  - name: Disable unit systemd mariadb (cegah start otomatis sebelum cluster siap)
    systemd:
      name: mariadb
      enabled: no
    when: "'mariadb_cluster' in group_names"

  - name: Mask service mariadb sementara (cegah start tidak sengaja)
    systemd:
      name: mariadb
      masked: yes
    when: "'mariadb_cluster' in group_names"

# ============================================================
# 3. KONFIGURASI MARIADB GALERA CLUSTER
# ============================================================

  - name: Pastikan direktori conf.d MySQL ada
    file:
      path: /etc/mysql/conf.d
      state: directory
      owner: root
      group: root
      mode: "0755"
    when: "'mariadb_cluster' in group_names"

  - name: Deploy file konfigurasi MariaDB Galera Cluster
    template:
      src: mariadb-cluster-config.j2
      dest: /etc/mysql/conf.d/mariadb_galera_cluster.cnf
      owner: mysql
      group: mysql
      mode: "0640"
    when: "'mariadb_cluster' in group_names"

  - name: Override bind-address default 127.0.0.1 (HAProxy & Galera butuh 0.0.0.0)
    lineinfile:
      path: /etc/mysql/mariadb.conf.d/50-server.cnf
      regexp: '^bind-address'
      line: 'bind-address            = 0.0.0.0'
    when: "'mariadb_cluster' in group_names"

  - name: Hapus konfigurasi MySQL default yang konflik jika ada
    file:
      path: /etc/mysql/conf.d/mysql.cnf
      state: absent
    when: "'mariadb_cluster' in group_names"

  - name: Hapus konfigurasi Galera lama jika ada (dari MySQL sebelumnya)
    file:
      path: /etc/mysql/conf.d/mysql_galera_cluster.cnf
      state: absent
    when: "'mariadb_cluster' in group_names"

# ============================================================
# 4. URUTAN STOP CLUSTER
# ============================================================

  - name: Unmask service MariaDB sebelum stop/start
    systemd:
      name: mariadb
      masked: no
    when: "'mariadb_cluster' in group_names"
    tags:
      - stop_cluster
      - start_cluster

  - name: Stop node MariaDB slave (bukan primary)
    shell: |
      set -o pipefail
      timeout 30 systemctl stop mariadb 2>/dev/null || true
      systemctl kill -s SIGKILL mariadb 2>/dev/null || true
      pkill -9 mariadbd 2>/dev/null || true
      pkill -9 -f wsrep_sst 2>/dev/null || true
      systemctl reset-failed mariadb 2>/dev/null || true
    args:
      executable: /bin/bash
    when: "('load_balancer' not in group_names) and (inventory_hostname != groups['mariadb_cluster'][0])"
    tags:
      - stop_cluster
    changed_when: true
    failed_when: false

  - name: Tunggu 15 detik agar slave node shutdown bersih
    pause:
      seconds: 15
    tags:
      - stop_cluster

  - name: Stop node MariaDB primary
    shell: |
      set -o pipefail
      timeout 30 systemctl stop mariadb 2>/dev/null || true
      systemctl kill -s SIGKILL mariadb 2>/dev/null || true
      pkill -9 mariadbd 2>/dev/null || true
      pkill -9 -f wsrep_sst 2>/dev/null || true
      systemctl reset-failed mariadb 2>/dev/null || true
    args:
      executable: /bin/bash
    when: inventory_hostname == groups['mariadb_cluster'][0]
    tags:
      - stop_cluster
    changed_when: true
    failed_when: false

  - name: Tunggu 10 detik untuk shutdown selesai total
    pause:
      seconds: 10
    tags:
      - stop_cluster

# ============================================================
# 5. URUTAN START / BOOTSTRAP CLUSTER
# ============================================================

  - name: Set safe_to_bootstrap pada node primary sebelum bootstrap
    shell: |
      set -o pipefail
      GRASTATE="/var/lib/mysql/grastate.dat"
      if [ -f "${GRASTATE}" ]; then
        sed -i 's/^safe_to_bootstrap:.*/safe_to_bootstrap: 1/' "${GRASTATE}"
      else
        cat > "${GRASTATE}" <<'EOF'
      # GALERA saved state
      version: 2.1
      uuid:    00000000-0000-0000-0000-000000000000
      seqno:   -1
      safe_to_bootstrap: 1
      EOF
      fi
      chown mysql:mysql "${GRASTATE}"
      chmod 660 "${GRASTATE}"
    args:
      executable: /bin/bash
    when: inventory_hostname == groups['mariadb_cluster'][0]
    tags:
      - start_cluster

  - name: Bootstrap node primary MariaDB dengan Galera
    shell: galera_new_cluster
    args:
      executable: /bin/bash
    when: inventory_hostname == groups['mariadb_cluster'][0]
    any_errors_fatal: true
    register: bootstrap_result
    tags:
      - start_cluster

  - name: Tampilkan hasil bootstrap
    debug:
      msg: "Bootstrap result: {{ bootstrap_result.stdout_lines | default('OK') }}"
    when: inventory_hostname == groups['mariadb_cluster'][0]
    tags:
      - start_cluster

  - name: Tunggu port 3306 primary benar-benar listening (bukan pause statis)
    shell: |
      for i in $(seq 1 120); do
        if ss -tln | grep -qE '0\.0\.0\.0:3306|\*:3306|{{ interface_ip }}:3306'; then
          exit 0
        fi
        sleep 1
      done
      ss -tln
      exit 1
    args:
      executable: /bin/bash
    when: inventory_hostname == groups['mariadb_cluster'][0]
    tags:
      - start_cluster

  - name: Tunggu port 3306 primary via wait_for (fallback)
    wait_for:
      host: "{{ interface_ip }}"
      port: 3306
      delay: 0
      timeout: 30
      state: started
    when: inventory_hostname == groups['mariadb_cluster'][0]
    tags:
      - start_cluster
    failed_when: false

  - name: Enable unit systemd mariadb di node primary
    systemd:
      name: mariadb
      enabled: yes
    when: inventory_hostname == groups['mariadb_cluster'][0]
    tags:
      - start_cluster

  - name: Set password root MariaDB sebelum slave join (via unix_socket)
    mysql_user:
      name: root
      host: "{{ item }}"
      check_implicit_admin: yes
      login_unix_socket: /run/mysqld/mysqld.sock
      password: "{{ mariadb_root_password }}"
      priv: "*.*:ALL,GRANT"
      state: present
      update_password: always
    loop:
      - 127.0.0.1
      - "localhost"
      - "%"
    when: inventory_hostname == groups['mariadb_cluster'][0]
    register: root_pw_socket_result
    ignore_errors: yes
    tags:
      - start_cluster

  - name: Set password root MariaDB sebelum slave join (fallback password auth)
    mysql_user:
      name: root
      host: "{{ item }}"
      login_user: root
      login_password: "{{ mariadb_root_password }}"
      login_host: 127.0.0.1
      password: "{{ mariadb_root_password }}"
      priv: "*.*:ALL,GRANT"
      state: present
      update_password: always
    loop:
      - 127.0.0.1
      - "localhost"
      - "%"
    when:
      - inventory_hostname == groups['mariadb_cluster'][0]
      - root_pw_socket_result is failed
    tags:
      - start_cluster

  - name: Buat user mariabackup di primary sebelum SST (donor wajib punya user ini)
    mysql_user:
      name: mariabackup
      host: localhost
      password: "{{ mariadb_sst_password }}"
      priv: "*.*:RELOAD,PROCESS,LOCK TABLES,REPLICATION CLIENT"
      state: present
      update_password: always
      check_implicit_admin: yes
      login_unix_socket: /run/mysqld/mysqld.sock
    when: inventory_hostname == groups['mariadb_cluster'][0]
    tags:
      - start_cluster

  - name: Start node MariaDB slave
    systemd:
      name: mariadb
      state: started
      enabled: yes
    when: "('load_balancer' not in group_names) and (inventory_hostname != groups['mariadb_cluster'][0])"
    any_errors_fatal: true
    register: slave_start_result
    retries: 5
    delay: 10
    until: slave_start_result is success
    tags:
      - start_cluster
    # retries diperbesar karena SST (full sync) data besar bisa
    # makan waktu lebih dari beberapa puluh detik.

  - name: Tunggu setiap slave node port 3306 listening setelah SST/IST
    shell: |
      for i in $(seq 1 300); do
        if ss -tln | grep -qE '0\.0\.0\.0:3306|\*:3306|{{ interface_ip }}:3306'; then
          exit 0
        fi
        sleep 1
      done
      ss -tln
      exit 1
    args:
      executable: /bin/bash
    when: "('load_balancer' not in group_names) and (inventory_hostname != groups['mariadb_cluster'][0])"
    tags:
      - start_cluster

# ============================================================
# 6. SETUP HAPROXY LOAD BALANCER
# ============================================================

  - name: Install paket HAProxy
    apt:
      name: "{{ item }}"
      state: present
      update_cache: yes
    loop:
      - haproxy
      - python3-pymysql
    when: "'load_balancer' in group_names"

  - name: Enable service systemd HAProxy
    systemd:
      name: haproxy
      enabled: yes
    when: "'load_balancer' in group_names"

  - name: Deploy file konfigurasi HAProxy
    template:
      src: haproxy-config.j2
      dest: /etc/haproxy/haproxy.cfg
      owner: root
      group: root
      mode: "0644"
      validate: 'haproxy -c -f %s'
    when: "'load_balancer' in group_names"

# ============================================================
# 7. SET ROOT PASSWORD & BUAT USER (setelah cluster pasti up)
# ============================================================

  - name: Pastikan MariaDB merespon di primary node sebelum konfigurasi user
    wait_for:
      host: "{{ interface_ip }}"
      port: 3306
      timeout: 60
    when: inventory_hostname == groups['mariadb_cluster'][0]

  - name: Set password root MariaDB (via unix_socket, andal untuk run pertama & berikutnya)
    mysql_user:
      name: root
      host: "{{ item }}"
      check_implicit_admin: yes
      login_unix_socket: /run/mysqld/mysqld.sock
      password: "{{ mariadb_root_password }}"
      priv: "*.*:ALL,GRANT"
      state: present
      update_password: always
    loop:
      - "{{ hostvars[groups['load_balancer'][0]]['interface_ip'] | default(hostvars[groups['load_balancer'][0]]['ansible_default_ipv4']['address']) }}"
      - 127.0.0.1
      - "localhost"
      - "%"
    when: inventory_hostname == groups['mariadb_cluster'][0]

  - name: Hapus user anonymous
    mysql_user:
      name: ""
      host_all: yes
      state: absent
      login_user: root
      login_password: "{{ mariadb_root_password }}"
      login_host: 127.0.0.1
    when: inventory_hostname == groups['mariadb_cluster'][0]

  - name: Hapus database test
    mysql_db:
      name: test
      state: absent
      login_user: root
      login_password: "{{ mariadb_root_password }}"
      login_host: 127.0.0.1
    when: inventory_hostname == groups['mariadb_cluster'][0]

  - name: Buat/perbarui user SST mariabackup (replikasi Galera ke semua node)
    mysql_user:
      name: mariabackup
      host: localhost
      password: "{{ mariadb_sst_password }}"
      priv: "*.*:RELOAD,PROCESS,LOCK TABLES,REPLICATION CLIENT"
      state: present
      update_password: always
      login_user: root
      login_password: "{{ mariadb_root_password }}"
      login_host: 127.0.0.1
    when: inventory_hostname == groups['mariadb_cluster'][0]
    # User dibuat di primary sebelum SST; task ini idempotent untuk re-run playbook.

  - name: Buat user health-check HAProxy di semua node cluster
    mysql_user:
      name: haproxy
      host: "{{ hostvars[groups['load_balancer'][0]]['interface_ip'] | default(hostvars[groups['load_balancer'][0]]['ansible_default_ipv4']['address']) }}"
      state: present
      password: ""
      priv: "*.*:USAGE"
      login_user: root
      login_password: "{{ mariadb_root_password }}"
      login_host: 127.0.0.1
    when: "'mariadb_cluster' in group_names"

# ============================================================
# 8. RESTART HAPROXY DENGAN KONFIG BARU
# ============================================================

  - name: Restart service HAProxy
    systemd:
      name: haproxy
      state: restarted
      daemon_reload: yes
    when: "'load_balancer' in group_names"

# ============================================================
# 9. VERIFIKASI STATUS CLUSTER
# ============================================================

  - name: Cek ukuran cluster via load balancer
    shell: >
      mysql
      -h {{ hostvars[groups['load_balancer'][0]]['interface_ip'] | default(hostvars[groups['load_balancer'][0]]['ansible_default_ipv4']['address']) }}
      -u root -p{{ mariadb_root_password }}
      -N -e "SHOW STATUS LIKE 'wsrep_cluster_size'"
      | awk '{print $2}'
    when: inventory_hostname == groups['load_balancer'][0]
    run_once: true
    register: cluster_status
    changed_when: false
    no_log: true

  - name: Cek konsistensi status cluster (state comment)
    shell: >
      mysql
      -h {{ hostvars[groups['load_balancer'][0]]['interface_ip'] | default(hostvars[groups['load_balancer'][0]]['ansible_default_ipv4']['address']) }}
      -u root -p{{ mariadb_root_password }}
      -N -e "SHOW STATUS LIKE 'wsrep_local_state_comment'"
      | awk '{print $2}'
    when: inventory_hostname == groups['load_balancer'][0]
    run_once: true
    register: cluster_state
    changed_when: false
    no_log: true

  - name: Tampilkan informasi koneksi cluster
    debug:
      msg:
        - "==========================================="
        - " MariaDB Galera Cluster Setup Complete!"
        - "==========================================="
        - " Cluster Name      : {{ mariadb_cluster_name }}"
        - " Active Nodes      : {{ cluster_status.stdout | default('unknown') }}"
        - " Cluster State     : {{ cluster_state.stdout | default('unknown') }}"
        - ""
        - " Connection String :"
        - " mysql -h {{ hostvars[groups['load_balancer'][0]]['interface_ip'] | default(hostvars[groups['load_balancer'][0]]['ansible_default_ipv4']['address']) }} -P 3306 -u root -p"
        - ""
        - " HAProxy Stats     :"
        - " http://{{ hostvars[groups['load_balancer'][0]]['interface_ip'] | default(hostvars[groups['load_balancer'][0]]['ansible_default_ipv4']['address']) }}:8404/"
        - " (kredensial stats: lihat haproxy-config.j2 / file credentials)"
        - "==========================================="
    when: inventory_hostname == groups['load_balancer'][0]
    run_once: true
