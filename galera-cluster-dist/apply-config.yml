---
# Deploy ulang mariadb-cluster-config.j2 + rolling restart (serial: 1)
# Pakai: ./apply-config.sh
- hosts: mariadb_cluster
  become: true
  serial: 1
  tasks:
    - name: Deploy file konfigurasi MariaDB Galera Cluster
      template:
        src: mariadb-cluster-config.j2
        dest: /etc/mysql/conf.d/mariadb_galera_cluster.cnf
        owner: mysql
        group: mysql
        mode: "0640"

    - name: Restart MariaDB agar config aktif
      systemd:
        name: mariadb
        state: restarted

    - name: Tunggu MariaDB ready setelah restart
      wait_for:
        host: "{{ interface_ip }}"
        port: 3306
        delay: 3
        timeout: 120

    - name: Verifikasi cluster size di node ini
      shell: |
        mysql -uroot -p"{{ mariadb_root_password }}" -N -e \
          "SHOW STATUS LIKE 'wsrep_cluster_size'; SHOW STATUS LIKE 'wsrep_local_state_comment';"
      register: node_verify
      changed_when: false
      no_log: true

    - name: Status node setelah restart
      debug:
        msg: "{{ inventory_hostname }}: {{ node_verify.stdout_lines }}"
